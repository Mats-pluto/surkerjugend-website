# ============================================================
# Surker Jugend – CMS-Konfiguration (Decap CMS)
# Diese Datei beschreibt, WAS im CMS bearbeitet werden kann.
# ============================================================

# --- Wo werden Änderungen gespeichert? (Login über DecapBridge) ---
# DecapBridge übernimmt Login + das Schreiben ins GitHub-Repo.
# Die Bearbeiter brauchen dadurch KEINEN eigenen GitHub-Account.
backend:
  name: git-gateway
  repo: Mats-pluto/surkerjugend-website
  branch: main          # auf welchen Branch committet wird
  identity_url: https://auth.decapbridge.com/sites/4ab963ec-ec37-49bf-a97c-fbca7ab2f7ad
  gateway_url: https://gateway.decapbridge.com
  # Aussagekräftige Commit-Nachrichten: zeigt, wer was geändert hat
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# --- Speicher-Modus ---
# "simple" (Standard): Ein Klick auf "Veröffentlichen" speichert SOFORT
# und schaltet live. KEIN zweistufiger Entwurf-Prozess ("editorial_workflow"),
# bei dem Änderungen versehentlich als unveröffentlichter Entwurf hängen
# bleiben können. Wir setzen es explizit, damit das Verhalten eindeutig ist.
publish_mode: simple

# DecapBridge-Logo im CMS
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Link zurück zur Website im CMS-Menü
site_url: https://suju.codebymats.de

# --- Sprache der Oberfläche ---
locale: de

# --- Wohin kommen hochgeladene Bilder? (Standard-Ordner) ---
# media_folder: der echte Ordner im Repo, in dem Bilder landen.
# public_folder: der Pfad, mit dem die Bilder später auf der Seite
# eingebunden werden (so wie aktionen.js sie erwartet).
# Hinweis: Einzelne Bild-Felder können diesen Standard überschreiben
# (siehe Leiter-Foto unten -> eigener Ordner assets/leiter).
media_folder: "assets/aktionen"
public_folder: "assets/aktionen"

# --- Die bearbeitbaren Inhalte ---
collections:
  - name: "aktionen"            # interner Name
    label: "Aktionen"          # so heißt der Bereich im CMS-Menü
    label_singular: "Aktion"   # Einzahl (für "Neue Aktion"-Knopf)
    # "file" = eine einzelne Datei, in der eine Liste steht
    # (statt vieler Einzeldateien). Passt zu data/aktionen.json.
    files:
      - name: "aktionsliste"
        label: "Aktionen verwalten"
        file: "data/aktionen.json"
        description: "Hier könnt ihr Aktionen hinzufügen, bearbeiten, löschen und per Ziehen umsortieren. Änderungen mit 'Veröffentlichen' speichern – sie sind nach kurzer Zeit live."
        fields:
          # Das Feld "aktionen" ist eine Liste. Jeder Listeneintrag
          # hat die darunter definierten Felder.
          - name: "aktionen"
            label: "Aktionen"
            label_singular: "Aktion"
            widget: "list"
            # Diese Zusammenfassung zeigt das CMS in der Listübersicht,
            # damit man Aktionen erkennt, ohne sie zu öffnen.
            summary: "{{fields.datum}} – {{fields.titel}}"
            fields:
              - name: "datum"
                label: "Datum (z.B. 30.05.2026 oder 04.06. – 07.06.2026)"
                widget: "string"

              - name: "titel"
                label: "Titel"
                widget: "string"

              - name: "text"
                label: "Beschreibung"
                widget: "text"   # mehrzeiliges Textfeld
                hint: "Für Fettschrift **Sternchen** verwenden. Zeilenumbrüche werden übernommen."

              - name: "anmeldung_url"
                label: "Anmelde-Link (optional)"
                widget: "string"
                required: false
                hint: "Link zum Anmeldeformular. Leer lassen, wenn keine Anmeldung nötig ist."

              - name: "bild"
                label: "Bild (optional)"
                widget: "image"
                required: false
                hint: "Optionales Bild, das oben in der Aktion angezeigt wird."

  # --- NEU: Leiterrunde ---
  - name: "leiterrunde"
    label: "Leiterrunde"
    label_singular: "Leiter:in"
    files:
      - name: "leiterliste"
        label: "Leiterrunde verwalten"
        file: "data/leiter.json"
        description: "Hier könnt ihr die Leiterrunde pflegen: Personen hinzufügen, bearbeiten, löschen und per Ziehen umsortieren. Das Alter wird automatisch aus dem Geburtsdatum berechnet – ihr müsst es also nie selbst aktualisieren. Änderungen mit 'Veröffentlichen' speichern."
        fields:
          - name: "leiter"
            label: "Leiterrunde"
            label_singular: "Person"
            widget: "list"
            # Zeigt Name + Rolle in der Übersicht
            summary: "{{fields.name}}{{#if fields.rolle}} – {{fields.rolle}}{{/if}}"
            fields:
              - name: "name"
                label: "Name"
                widget: "string"   # Pflichtfeld (Standard)

              - name: "rolle"
                label: "Rolle (optional)"
                widget: "string"
                required: false
                hint: "z.B. 'Gruppenleitung' oder 'Kassenwart'. Leer lassen, wenn keine besondere Rolle – dann wird nichts angezeigt."

              - name: "geburtsdatum"
                label: "Geburtsdatum"
                widget: "date"
                # Datumsformat, in dem es in der JSON gespeichert wird.
                # Genau dieses Format erwartet die Alters-Berechnung in leiter.js.
                date_format: "YYYY-MM-DD"
                # Anzeige im Kalender-Auswahlfeld (für die Bearbeiter)
                format: "DD.MM.YYYY"
                hint: "Aus dem Geburtsdatum wird automatisch das aktuelle Alter berechnet und angezeigt. Das genaue Datum erscheint NICHT auf der Website, nur das Alter."

              - name: "taetig_seit"
                label: "Ehrenamtlich tätig seit (optional)"
                widget: "string"
                required: false
                hint: "Jahreszahl, z.B. 2024. Leer lassen, wenn unbekannt – dann wird '-' angezeigt."

              - name: "bild"
                label: "Foto (optional)"
                widget: "image"
                required: false
                # Eigener Ordner nur für Leiter-Fotos, getrennt von den Aktionsbildern.
                media_folder: "/assets/leiter"
                public_folder: "/assets/leiter"
                hint: "Quadratisches Foto sieht am besten aus (z.B. 600x600px). Ohne Foto wird der Anfangsbuchstabe als Platzhalter angezeigt."
