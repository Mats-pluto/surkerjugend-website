# ============================================================
# Surker Jugend – CMS-Konfiguration (Decap CMS)
# Diese Datei beschreibt, WAS im CMS bearbeitet werden kann.
# ============================================================

# --- Wo werden Änderungen gespeichert? (Login über DecapBridge) ---
backend:
  name: git-gateway
  repo: Mats-pluto/surkerjugend-website
  branch: main
  identity_url: https://auth.decapbridge.com/sites/4ab963ec-ec37-49bf-a97c-fbca7ab2f7ad
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

publish_mode: simple

logo_url: https://decapbridge.com/decapcms-with-bridge.svg

site_url: https://suju.codebymats.de

locale: de

media_folder: "assets/aktionen"
public_folder: "assets/aktionen"

collections:
  # --- Aktionen ---
  - name: "aktionen"
    label: "Aktionen"
    label_singular: "Aktion"
    files:
      - name: "aktionsliste"
        label: "Aktionen verwalten"
        file: "data/aktionen.json"
        description: "Hier könnt ihr Aktionen hinzufügen, bearbeiten, löschen und per Ziehen umsortieren. Änderungen mit 'Veröffentlichen' speichern – sie sind nach kurzer Zeit live."
        fields:
          - name: "aktionen"
            label: "Aktionen"
            label_singular: "Aktion"
            widget: "list"
            summary: "{{fields.datum}} – {{fields.titel}}"
            fields:
              - name: "datum"
                label: "Datum (z.B. 30.05.2026 oder 04.06. – 07.06.2026)"
                widget: "string"

              - name: "titel"
                label: "Titel"
                widget: "string"

              - name: "text"
                label: "Beschreibung"
                widget: "text"
                hint: "Für Fettschrift **Sternchen** verwenden. Zeilenumbrüche werden übernommen."

              - name: "anmeldung_url"
                label: "Anmelde-Link (optional)"
                widget: "string"
                required: false
                hint: "Link zum Anmeldeformular. Leer lassen, wenn keine Anmeldung nötig ist."

              - name: "bild"
                label: "Bild (optional)"
                widget: "image"
                required: false
                hint: "Optionales Bild, das oben in der Aktion angezeigt wird."

  # --- Leiterrunde ---
  - name: "leiterrunde"
    label: "Leiterrunde"
    label_singular: "Leiter:in"
    files:
      - name: "leiterliste"
        label: "Leiterrunde verwalten"
        file: "data/leiter.json"
        description: "Hier könnt ihr die Leiterrunde pflegen: Personen hinzufügen, bearbeiten, löschen und per Ziehen umsortieren. Das Alter wird automatisch aus dem Geburtsdatum berechnet – ihr müsst es also nie selbst aktualisieren. Änderungen mit 'Veröffentlichen' speichern."
        fields:
          - name: "leiter"
            label: "Leiterrunde"
            label_singular: "Person"
            widget: "list"
            summary: "{{fields.name}}{{#if fields.rolle}} – {{fields.rolle}}{{/if}}"
            fields:
              - name: "name"
                label: "Name"
                widget: "string"

              - name: "rolle"
                label: "Rolle"
                widget: "string"
                required: false
                hint: "Optional, z.B. 'Gruppenleitung' oder 'Kassenwart'. Leer lassen, wenn keine besondere Rolle – dann wird nichts angezeigt."

              - name: "geburtsdatum"
                label: "Geburtsdatum"
                widget: "datetime"
                date_format: "YYYY-MM-DD"
                time_format: false
                picker_utc: false
                hint: "Aus dem Geburtsdatum wird automatisch das aktuelle Alter berechnet und angezeigt. Das genaue Datum erscheint NICHT auf der Website, nur das Alter."

              - name: "taetig_seit"
                label: "Ehrenamtlich tätig seit"
                widget: "string"
                required: false
                hint: "Optional. Jahreszahl, z.B. 2024. Leer lassen, wenn unbekannt – dann wird '-' angezeigt."

              - name: "bild"
                label: "Foto"
                widget: "image"
                required: false
                hint: "Optional. Quadratisches Foto sieht am besten aus (z.B. 600x600px). Ohne Foto wird der Anfangsbuchstabe als Platzhalter angezeigt."

  # --- Einblicke (Galerie) ---
  - name: "einblicke"
    label: "Einblicke"
    label_singular: "Foto"
    files:
      - name: "einblickeliste"
        label: "Einblicke verwalten"
        file: "data/einblicke.json"
        description: "Hier könnt ihr Fotos für die Galerie hinzufügen, bearbeiten, löschen und per Ziehen umsortieren. Eine Beschreibung unter dem Bild ist optional. Änderungen mit 'Veröffentlichen' speichern."
        fields:
          - name: "einblicke"
            label: "Fotos"
            label_singular: "Foto"
            widget: "list"
            summary: "{{#if fields.text}}{{fields.text}}{{else}}Foto ohne Beschreibung{{/if}}"
            fields:
              - name: "bild"
                label: "Foto"
                widget: "image"
                hint: "Das Foto für die Galerie. Wird im 4:3-Format angezeigt."

              - name: "text"
                label: "Beschreibung"
                widget: "string"
                required: false
                hint: "Optional. Kurzer Text, der unter dem Bild erscheint. Leer lassen, wenn das Bild für sich stehen soll."

  # --- News (Startseite) ---
  - name: "news"
    label: "News"
    label_singular: "News-Eintrag"
    files:
      - name: "newsliste"
        label: "News verwalten"
        file: "data/news.json"
        description: "Hier könnt ihr aktuelle News für die Startseite verwalten. Bei leerer Liste wird der News-Abschnitt automatisch ausgeblendet. Änderungen mit 'Veröffentlichen' speichern."
        fields:
          - name: "news"
            label: "News"
            label_singular: "News-Eintrag"
            widget: "list"
            summary: "{{fields.titel}}"
            fields:
              - name: "titel"
                label: "Titel"
                widget: "string"

              - name: "text"
                label: "Text"
                widget: "text"
                hint: "Für Fettschrift **Sternchen** verwenden. Zeilenumbrüche werden übernommen."

              - name: "link_url"
                label: "Link-URL (optional)"
                widget: "string"
                required: false
                hint: "Optional. Wenn angegeben, erscheint ein Knopf mit dem unten angegebenen Text."

              - name: "link_text"
                label: "Link-Beschriftung (optional)"
                widget: "string"
                required: false
                hint: "Text auf dem Knopf, z.B. 'Jetzt abstimmen'. Nur nötig, wenn ein Link angegeben ist."

  # --- Downloads ---
  - name: "downloads"
    label: "Downloads"
    label_singular: "Download"
    files:
      - name: "downloadliste"
        label: "Downloads verwalten"
        file: "data/downloads.json"
        description: "Hier könnt ihr die Download-Karten bearbeiten (Titel und Beschreibung). Wichtig: Die Dateien selbst (.docx) müssen separat per Git ins Repo gelegt werden – das CMS kann nur Bilder hochladen, keine Dokumente. Änderungen mit 'Veröffentlichen' speichern."
        fields:
          - name: "downloads"
            label: "Downloads"
            label_singular: "Download"
            widget: "list"
            summary: "{{fields.titel}}"
            fields:
              - name: "titel"
                label: "Titel"
                widget: "string"
                hint: "Name des Dokuments, z.B. 'Gesundheitszeugnis'."

              - name: "beschreibung"
                label: "Beschreibung"
                widget: "text"
                hint: "Kurzer Text, der unter dem Titel erscheint."

              - name: "datei"
                label: "Dateipfad"
                widget: "string"
                hint: "Pfad zur Datei im Repo, z.B. 'downloads/gesundheitszeugnis-2026.docx'. Die Datei muss per Git hochgeladen worden sein."
